name: Branch name + PR title

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: read

jobs:
  branch-name:
    name: Branch follows CLAUDE.md §6 convention
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          # Allowed:
          #   <type>/d<NNN>-<kebab>      e.g. feat/d011-drizzle-orm-setup
          #   chore/bootstrap-<topic>    e.g. chore/bootstrap-pr1b
          # See CLAUDE.md §6 for the full table.
          if ! echo "$HEAD_REF" | grep -qE '^(feat|fix|chore|docs|refactor|test|perf|security)/(d[0-9]{3}-|bootstrap-)'; then
            echo "::error::Branch '${HEAD_REF}' does not match the CLAUDE.md §6 naming convention."
            echo "Expected: <type>/d<NNN>-<kebab>  OR  chore/bootstrap-<topic>"
            echo "Allowed types: feat, fix, chore, docs, refactor, test, perf, security"
            exit 1
          fi
          echo "✓ Branch name passes CLAUDE.md §6 convention."

  pr-title:
    name: PR title follows Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            security
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}"
            didn't match the configured pattern. Please ensure that
            the subject starts with a lowercase character.
          headerPattern: '^(\w+)(?:\(([\w$.\-*/ ]*)\))?!?: (.+)$'

  pr-body:
    name: PR body references D-decisions or is bootstrap-exempt
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check body
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          # Bootstrap PRs are exempt from `Closes D###` per CLAUDE.md §6.
          if echo "$HEAD_REF" | grep -qE '^chore/bootstrap-'; then
            echo "✓ Bootstrap branch — exempt from Closes D### requirement."
            exit 0
          fi
          # Non-bootstrap: must have at least one `Closes D###`.
          if printf '%s' "$PR_BODY" | grep -qE 'Closes\s+D[0-9]{1,3}'; then
            echo "✓ PR body contains Closes D### reference."
            exit 0
          fi
          echo "::error::PR body must contain at least one 'Closes D###' reference (CLAUDE.md §6)."
          echo "If this PR genuinely has no D-tie, rename the branch to chore/bootstrap-<topic>."
          exit 1
