name: Log summary

on:
  push:
    branches: [main]
    paths: ['IMPLEMENTATION-LOG.md']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recompute-summary:
    name: Recompute summary counts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Recompute summary block
        run: |
          set -euo pipefail
          log=IMPLEMENTATION-LOG.md

          # Counts by status symbol within AUTO:DECISIONS table.
          not_started=$(awk '/AUTO:DECISIONS:START/,/AUTO:DECISIONS:END/' "$log" | grep -c '| ⬜ |' || true)
          in_progress=$(awk '/AUTO:DECISIONS:START/,/AUTO:DECISIONS:END/' "$log" | grep -c '| 🟡 |' || true)
          shipped=$(awk     '/AUTO:DECISIONS:START/,/AUTO:DECISIONS:END/' "$log" | grep -c '| 🔵 |' || true)
          verified=$(awk    '/AUTO:DECISIONS:START/,/AUTO:DECISIONS:END/' "$log" | grep -c '| 🟢 |' || true)
          blocked=$(awk     '/AUTO:DECISIONS:START/,/AUTO:DECISIONS:END/' "$log" | grep -c '| 🔴 |' || true)
          deferred=$(awk    '/AUTO:DECISIONS:START/,/AUTO:DECISIONS:END/' "$log" | grep -c '| ⏸️ |' || true)
          total=$((not_started + in_progress + shipped + verified + blocked + deferred))

          summary=$(cat <<EOF
          <!-- AUTO:SUMMARY:START -->

          - ⬜ Not started: ${not_started}
          - 🟡 In progress: ${in_progress}
          - 🔵 Shipped: ${shipped}
          - 🟢 Verified: ${verified}
          - 🔴 Blocked: ${blocked}
          - ⏸️ Deferred: ${deferred}
          - **Total: ${total} D-decisions**

          <!-- AUTO:SUMMARY:END -->
          EOF
          )

          # Replace the AUTO:SUMMARY block in place. If markers are absent,
          # leave the file alone (the founder-curated stub still owns the
          # summary placeholder until the row-generator + this workflow have
          # both run at least once).
          if grep -q "AUTO:SUMMARY:START" "$log"; then
            python3 - <<PYEOF
          import re, pathlib
          p = pathlib.Path("$log")
          src = p.read_text()
          new = re.sub(
              r'<!-- AUTO:SUMMARY:START -->.*?<!-- AUTO:SUMMARY:END -->',
              '''$summary''',
              src, count=1, flags=re.DOTALL,
          )
          p.write_text(new)
          PYEOF
          else
            echo "No AUTO:SUMMARY markers in $log — skipping update."
            exit 0
          fi

      - name: Commit if changed
        run: |
          if git diff --quiet IMPLEMENTATION-LOG.md; then
            echo "Summary unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add IMPLEMENTATION-LOG.md
          git commit -m "chore(log): recompute IMPLEMENTATION-LOG summary"
          git push origin main
