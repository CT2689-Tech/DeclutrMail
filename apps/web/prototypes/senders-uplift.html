<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Senders Uplift — Prototype (A / B / C)</title>
    <!--

  ────────────────────────────────────────────────────

  switchable via URL ?variant=A|B|C and ?view=list|detail or the floating
  bottom bar. Built to compare composition and direction visually before
  picking one to implement.

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fafaf7;
        --paper: #f4f4f0;
        --card: #ffffff;
        --fg: #0e1413;
        --fgSoft: #4b5552;
        --fgMuted: #646d69;
        --primary: #006b5f;
        --primaryDeep: #00463f;
        --primarySoft: rgba(0, 107, 95, 0.08);
        --primaryWash: hsl(174 60% 96%);
        --amber: #b45309;
        --amberWash: hsl(31 70% 95%);
        --emerald: #047857;
        --emeraldWash: hsl(160 60% 95%);
        --red: #b91c1c;
        --violet: #7c3aed;
        --violetWash: hsl(263 80% 97%);
        --line: rgba(14, 20, 19, 0.1);
        --lineSoft: rgba(14, 20, 19, 0.06);
        --border: rgba(14, 20, 19, 0.14);
        --shadow-card: 0 1px 2px rgba(14, 20, 19, 0.04), 0 1px 4px rgba(14, 20, 19, 0.04);
        --shadow-pop: 0 10px 28px rgba(14, 20, 19, 0.08);
        --shadow-lift: 0 8px 24px rgba(14, 20, 19, 0.1);
        --font-sans: 'Geist', 'Inter', system-ui, -apple-system, sans-serif;
        --font-mono: 'Geist Mono', ui-monospace, 'JetBrains Mono', monospace;
        --font-display: 'Fraunces', Georgia, serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      button {
        font: inherit;
        color: inherit;
        background: none;
        border: none;
        cursor: pointer;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .mono {
        font-family: var(--font-mono);
      }
      .display {
        font-family: var(--font-display);
      }

      .app-shell {
        max-width: 1240px;
        margin: 0 auto;
        padding: 24px 28px 120px;
        min-height: 100vh;
      }
      .top-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0 20px;
        border-bottom: 1px solid var(--lineSoft);
        margin-bottom: 28px;
      }
      .top-nav .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: -0.01em;
      }
      .top-nav .brand .logo-dot {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: linear-gradient(135deg, var(--primary), var(--primaryDeep));
        box-shadow: 0 2px 8px rgba(0, 107, 95, 0.25);
      }
      .top-nav .right {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .search {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 8px;
        width: 240px;
        font-size: 13px;
        color: var(--fgMuted);
      }
      .btn {
        padding: 7px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--line);
        background: var(--card);
        transition: all 150ms;
      }
      .btn:hover {
        box-shadow: var(--shadow-card);
      }
      .btn.primary {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      .btn.primary:hover {
        background: var(--primaryDeep);
      }
      .btn.warn {
        background: var(--amber);
        color: white;
        border-color: var(--amber);
      }
      .btn.ghost {
        background: transparent;
        border-color: transparent;
      }
      .btn-sm {
        padding: 4px 10px;
        font-size: 12px;
      }
      .eyebrow {
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.08em;
        color: var(--fgMuted);
        font-weight: 500;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        background: var(--paper);
        color: var(--fgSoft);
        border: 1px solid var(--lineSoft);
      }
      .pill.teal {
        background: var(--primarySoft);
        color: var(--primaryDeep);
        border-color: rgba(0, 107, 95, 0.18);
      }
      .pill.amber {
        background: var(--amberWash);
        color: var(--amber);
        border-color: rgba(180, 83, 9, 0.18);
      }
      .pill.emerald {
        background: var(--emeraldWash);
        color: var(--emerald);
        border-color: rgba(4, 120, 87, 0.18);
      }
      .pill.violet {
        background: var(--violetWash);
        color: var(--violet);
        border-color: rgba(124, 58, 237, 0.18);
      }
      .kbd {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 4px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-bottom-width: 2px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fgSoft);
        line-height: 1.2;
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--paper);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 12px;
        flex-shrink: 0;
        color: white;
        overflow: hidden;
      }
      .avatar.lg {
        width: 56px;
        height: 56px;
        font-size: 18px;
        border-radius: 12px;
      }
      .avatar.xl {
        width: 72px;
        height: 72px;
        font-size: 24px;
        border-radius: 14px;
      }
      .page-eyebrow {
        color: var(--fgMuted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 4px;
      }
      .page-title {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .page-title.display {
        font-family: var(--font-display);
        font-size: 30px;
        font-weight: 500;
      }

      /* ────────── VARIANT A — LIST ────────── */
      .vA-list .header-band {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 24px;
      }
      .vA-list .header-band .lhs {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .vA-list .header-band .rhs {
        display: flex;
        gap: 8px;
      }
      .vA-hero {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 200px;
        gap: 24px;
        padding: 24px 28px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: var(--shadow-card);
        margin-bottom: 20px;
        align-items: center;
      }
      .vA-hero .kpi-eyebrow {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--fgMuted);
        margin-bottom: 6px;
        font-weight: 500;
      }
      .vA-hero .kpi-num {
        font-size: 34px;
        font-weight: 600;
        letter-spacing: -0.025em;
        color: var(--fg);
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }
      .vA-hero .kpi-sub {
        font-size: 12px;
        color: var(--fgMuted);
        margin-top: 4px;
      }
      .vA-hero .spark-cell {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }
      .vA-hero .spark-cta {
        font-size: 12px;
        color: var(--primary);
        font-weight: 500;
      }
      .vA-hero .spark-cta:hover {
        color: var(--primaryDeep);
      }
      .vA-filters {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .chip {
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 12px;
        background: var(--card);
        border: 1px solid var(--line);
        color: var(--fgSoft);
        cursor: pointer;
      }
      .chip.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      .chip:hover:not(.active) {
        background: var(--paper);
      }
      .vA-group {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        margin-bottom: 12px;
        overflow: hidden;
        box-shadow: var(--shadow-card);
      }
      .vA-group-head {
        padding: 14px 20px 8px;
        border-bottom: 1px solid var(--lineSoft);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .vA-group-head-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        justify-content: space-between;
      }
      .vA-group-head .label {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--fg);
      }
      .vA-group-head .count {
        font-size: 12px;
        color: var(--fgMuted);
        margin-left: 6px;
      }
      .vA-group-head .noise-share {
        font-size: 11px;
        color: var(--fgMuted);
        font-variant-numeric: tabular-nums;
      }
      .vA-group-head .noise-stripe {
        height: 3px;
        background: var(--primary);
        border-radius: 2px;
        margin-top: 4px;
      }
      .vA-row {
        display: grid;
        grid-template-columns: 20px 32px minmax(0, 1.6fr) minmax(0, 1.2fr) 80px 156px 22px;
        align-items: center;
        gap: 14px;
        padding: 12px 20px;
        border-top: 1px solid var(--lineSoft);
        transition: all 150ms;
        cursor: pointer;
      }
      .vA-row:first-child {
        border-top: none;
      }
      .vA-row:hover {
        background: var(--paper);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(14, 20, 19, 0.04);
        z-index: 1;
        position: relative;
      }
      .vA-row input[type='checkbox'] {
        accent-color: var(--primary);
      }
      .vA-row .name-cell {
        min-width: 0;
      }
      .vA-row .name-cell .nm {
        font-weight: 500;
        font-size: 13.5px;
        letter-spacing: -0.005em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .vA-row .name-cell .dom {
        font-family: var(--font-mono);
        font-size: 10.5px;
        color: var(--fgMuted);
        margin-top: 1px;
      }
      .vA-row .evidence {
        font-size: 12px;
        color: var(--fgSoft);
        display: flex;
        gap: 8px;
        align-items: center;
        white-space: nowrap;
        overflow: hidden;
      }
      .vA-row .evidence .sep {
        color: var(--line);
      }
      .vA-row .evidence .trend-up {
        color: var(--amber);
      }
      .vA-row .evidence .trend-down {
        color: var(--fgMuted);
      }
      .vA-row .evidence .read-low {
        color: var(--amber);
      }
      .vA-row .actions {
        display: flex;
        gap: 4px;
        justify-content: flex-end;
      }
      .vA-row .actions .verb {
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--fgSoft);
        transition: all 120ms;
      }
      .vA-row .actions .verb.rec.unsub {
        background: var(--amber);
        color: white;
        border-color: var(--amber);
        padding: 5px 12px;
      }
      .vA-row .actions .verb.rec.keep {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
        padding: 5px 12px;
      }
      .vA-row .actions .verb.rec.archive {
        background: var(--fg);
        color: white;
        border-color: var(--fg);
        padding: 5px 12px;
      }
      .vA-row .actions .verb.icon-only {
        padding: 5px 7px;
      }
      .vA-row .actions .verb:hover {
        box-shadow: var(--shadow-card);
      }
      .vA-row .chev {
        color: var(--fgMuted);
        font-size: 12px;
      }
      .vA-row .spark-wrap {
        display: flex;
        justify-content: center;
      }

      /* ────────── VARIANT A — DETAIL ────────── */
      .vA-detail .back-link {
        color: var(--fgMuted);
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 16px;
      }
      .vA-detail .hero-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow-card);
        overflow: hidden;
        margin-bottom: 16px;
      }
      .vA-detail .rec-band {
        padding: 10px 24px;
        background: var(--amberWash);
        border-bottom: 1px solid rgba(180, 83, 9, 0.18);
        color: var(--amber);
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .vA-detail .hero-body {
        padding: 24px 28px;
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 32px;
        align-items: center;
      }
      .vA-detail .hero-id {
        display: flex;
        gap: 18px;
        align-items: center;
      }
      .vA-detail .hero-id .name {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .vA-detail .hero-id .dom {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--fgMuted);
        margin-top: 4px;
      }
      .vA-detail .hero-id .chips {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      .vA-detail .hero-kpi {
        text-align: right;
      }
      .vA-detail .hero-kpi .label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--fgMuted);
        font-weight: 500;
      }
      .vA-detail .hero-kpi .num {
        font-size: 44px;
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1;
        margin-top: 6px;
        font-variant-numeric: tabular-nums;
      }
      .vA-detail .hero-kpi .spark-row {
        margin-top: 8px;
      }
      .vA-detail .toolbar {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 16px;
        margin-bottom: 16px;
        display: flex;
        gap: 8px;
        align-items: center;
        box-shadow: var(--shadow-card);
      }
      .vA-detail .toolbar .verb-btn {
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--line);
        background: var(--card);
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        justify-content: center;
      }
      .vA-detail .toolbar .verb-btn.rec {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      .vA-detail .toolbar .verb-btn.rec.warn {
        background: var(--amber);
        border-color: var(--amber);
      }
      .vA-detail .toolbar .verb-btn:hover:not(.rec) {
        background: var(--paper);
      }
      .vA-detail .hero-chart {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 20px 24px;
        margin-bottom: 16px;
        box-shadow: var(--shadow-card);
      }
      .vA-detail .hero-chart .chart-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 16px;
      }
      .vA-detail .hero-chart .footnote {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--lineSoft);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: var(--fgMuted);
      }
      .vA-detail .stats-strip {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 16px;
      }
      .vA-detail .stat {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 16px;
        box-shadow: var(--shadow-card);
      }
      .vA-detail .stat .label {
        font-size: 9.5px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--fgMuted);
        font-weight: 500;
      }
      .vA-detail .stat .val {
        font-size: 17px;
        font-weight: 600;
        margin-top: 4px;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.015em;
      }
      .vA-detail .stat .val .unit {
        font-size: 11px;
        color: var(--fgMuted);
        font-weight: 500;
        margin-left: 3px;
      }
      .section {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 18px 22px;
        margin-bottom: 14px;
        box-shadow: var(--shadow-card);
      }
      .section h3 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--fgMuted);
        font-weight: 500;
        margin-bottom: 12px;
      }
      .msg-row {
        display: grid;
        grid-template-columns: 8px 1fr auto auto;
        gap: 12px;
        padding: 10px 0;
        border-top: 1px solid var(--lineSoft);
        align-items: baseline;
      }
      .msg-row:first-of-type {
        border-top: none;
      }
      .msg-row .unread-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
        margin-top: 6px;
      }
      .msg-row .unread-dot.read {
        background: var(--lineSoft);
      }
      .msg-row .subj {
        font-size: 13px;
        font-weight: 500;
      }
      .msg-row .snippet {
        display: block;
        font-size: 11.5px;
        color: var(--fgMuted);
        margin-top: 2px;
      }
      .msg-row .when {
        font-size: 11px;
        color: var(--fgMuted);
        font-variant-numeric: tabular-nums;
      }
      .hist-row {
        display: flex;
        gap: 12px;
        padding: 8px 0;
        border-top: 1px solid var(--lineSoft);
        align-items: center;
        font-size: 12px;
      }
      .hist-row:first-of-type {
        border-top: none;
      }
      .hist-row .when {
        color: var(--fgMuted);
        font-variant-numeric: tabular-nums;
        min-width: 80px;
        font-size: 11px;
      }

      /* ────────── VARIANT B — LIST ────────── */
      .vB-list .header-band {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 24px;
      }
      .vB-kpi-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow-card);
        margin-bottom: 16px;
        overflow: hidden;
      }
      .vB-kpi-cell {
        padding: 20px 22px;
        border-right: 1px solid var(--lineSoft);
        position: relative;
      }
      .vB-kpi-cell:last-child {
        border-right: none;
      }
      .vB-kpi-cell .label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--fgMuted);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .vB-kpi-cell .pulse-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--violet);
        display: inline-block;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }
      .vB-kpi-cell .num {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.025em;
        margin-top: 8px;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }
      .vB-kpi-cell .num .unit {
        font-size: 13px;
        color: var(--fgMuted);
        font-weight: 500;
        margin-left: 2px;
        letter-spacing: 0;
      }
      .vB-kpi-cell .micro {
        margin-top: 10px;
        height: 24px;
        display: flex;
        align-items: flex-end;
      }
      .vB-filters {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .vB-filters .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;

        box-shadow: var(--shadow-pop);
        padding: 36px 40px 30px;
        margin-bottom: 18px;
        position: relative;
        overflow: hidden;
      }
      .vD-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 85% -10%, var(--primaryWash) 0%, transparent 55%);
        pointer-events: none;
      }
      .vD-hero .eyebrow {
        position: relative;
        margin-bottom: 12px;
      }
      .vD-hero-grid {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 40px;
        align-items: end;
        margin-bottom: 26px;
        position: relative;
      }
      .vD-hero .story {
        font-family: var(--font-display);
        font-size: 34px;
        line-height: 1.22;
        letter-spacing: -0.02em;
        font-weight: 500;
        color: var(--fg);
        max-width: 720px;
      }
      .vD-hero .story p {
        margin: 0;
      }
      .vD-hero .story p + p {
        margin-top: 8px;
        color: var(--fgSoft);
      }
      .vD-hero .story .em {
        color: var(--amber);
        font-weight: 600;
      }
      .vD-hero .story .em-teal {
        color: var(--primary);
        font-weight: 600;
      }
      .vD-hero .trust-line {
        margin-top: 14px;
        font-size: 12px;
        color: var(--fgMuted);
        font-family: var(--font-mono);
        display: flex;
        align-items: center;
        gap: 8px;
        position: relative;
      }
      .vD-hero .trust-line .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--emerald);
      }
      .vD-hero .meta-strip {
        display: flex;
        gap: 32px;
        align-items: flex-end;
      }
      .vD-hero .meta {
        text-align: right;
      }
      .vD-hero .meta .v {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
      }
      .vD-hero .meta .l {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--fgMuted);
        margin-top: 5px;
        font-weight: 500;
      }
      .vD-hero .meta .delta.down {
        color: var(--emerald);
      }
      .vD-hero .meta .delta.up {
        color: var(--amber);
      }
      .vD-hero-cta {
        position: relative;
        background: var(--primaryWash);
        border: 1px solid rgba(0, 107, 95, 0.18);
        border-radius: 14px;
        padding: 18px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      .vD-hero-cta .copy {
        color: var(--primaryDeep);
        font-size: 14.5px;
        line-height: 1.5;
        max-width: 560px;
      }
      .vD-hero-cta .copy strong {
        font-weight: 600;
      }
      .vD-hero-cta .btn-start {
        background: var(--primary);
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid var(--primaryDeep);
        box-shadow: 0 6px 16px rgba(0, 107, 95, 0.25);
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: all 150ms;
      }
      .vD-hero-cta .btn-start:hover {
        background: var(--primaryDeep);
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(0, 107, 95, 0.3);
      }

      /* Weekly progress loop — retention surface, restrained */
      .vD-progress {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 14px 22px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        margin-bottom: 14px;
        box-shadow: var(--shadow-card);
      }
      .vD-progress .lhs {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .vD-progress .label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--fgMuted);
        font-weight: 500;
      }
      .vD-progress .copy {
        font-size: 13.5px;
        color: var(--fg);
        font-weight: 500;
      }
      .vD-progress .copy .em {
        color: var(--primary);
        font-weight: 600;
      }
      .vD-progress .bar {
        width: 220px;
        height: 6px;
        background: var(--lineSoft);
        border-radius: 3px;
        overflow: hidden;
      }
      .vD-progress .bar .fill {
        height: 100%;
        background: linear-gradient(to right, var(--primary), var(--primaryDeep));
        border-radius: 3px;
      }

      /* KPI strip — calmer than B (no pulse dots), 5 cells */
      .vD-kpi-strip {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow-card);
        margin-bottom: 18px;
        overflow: hidden;
      }
      .vD-kpi-cell {
        padding: 18px 22px;
        border-right: 1px solid var(--lineSoft);
      }
      .vD-kpi-cell:last-child {
        border-right: none;
      }
      .vD-kpi-cell .label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--fgMuted);
        font-weight: 500;
      }
      .vD-kpi-cell .num {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.025em;
        margin-top: 8px;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        color: var(--fg);
      }
      .vD-kpi-cell .num .unit {
        font-size: 12px;
        color: var(--fgMuted);
        font-weight: 500;
        margin-left: 3px;
        letter-spacing: 0;
      }
      .vD-kpi-cell .micro {
        margin-top: 8px;
        height: 14px;
        opacity: 0.7;
      }

      /* filter chips */
      .vD-filters {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .vD-filters .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 12.5px;
        background: var(--card);
        border: 1px solid var(--line);
        color: var(--fgSoft);
        cursor: pointer;
        transition: all 120ms;
        font-weight: 500;
      }
      .vD-filters .chip:hover:not(.active) {
        background: var(--paper);
        border-color: var(--border);
      }
      .vD-filters .chip.active {
        background: var(--fg);
        color: white;
        border-color: var(--fg);
      }
      .vD-filters .chip .stripe {
        width: 3px;
        height: 13px;
        border-radius: 2px;
      }

      /* category tables — clean, no row chart */
      .vD-group {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        margin-bottom: 12px;
        overflow: hidden;
        box-shadow: var(--shadow-card);
      }
      .vD-group-head {
        padding: 18px 24px 14px;
        border-bottom: 1px solid var(--lineSoft);
      }
      .vD-group-head-row {
        display: flex;
        align-items: baseline;
        gap: 12px;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .vD-group-head .label {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.015em;
        color: var(--fg);
      }
      .vD-group-head .count {
        font-size: 12px;
        color: var(--fgMuted);
        margin-left: 8px;
        font-weight: 500;
      }
      .vD-group-head .desc {
        font-size: 12.5px;
        color: var(--fgMuted);
        margin-top: 2px;
      }
      .vD-group-head .noise {
        font-size: 12.5px;
        color: var(--amber);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .vD-group-head .noise .l {
        color: var(--fgMuted);
        font-weight: 500;
        margin-left: 4px;
      }
      .vD-group-head .noise-stripe {
        height: 4px;
        background: linear-gradient(to right, var(--amber), rgba(180, 83, 9, 0.3));
        border-radius: 3px;
      }
      .vD-group-head .noise-stripe.teal {
        background: linear-gradient(to right, var(--primary), rgba(0, 107, 95, 0.3));
      }
      .vD-group-head .noise-stripe.fg {
        background: linear-gradient(to right, var(--fg), rgba(14, 20, 19, 0.3));
      }
      .vD-group-head .noise-stripe.emerald {
        background: linear-gradient(to right, var(--emerald), rgba(4, 120, 87, 0.3));
      }
      .vD-group-head .group-icon {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        margin-right: 10px;
        vertical-align: middle;
      }
      .vD-group-head .group-icon.cleanup {
        background: var(--amberWash);
        color: var(--amber);
      }
      .vD-group-head .group-icon.later {
        background: var(--paper);
        color: var(--fg);
      }
      .vD-group-head .group-icon.protect {
        background: var(--emeraldWash);
        color: var(--emerald);
      }
      .vD-group-head .group-icon.people {
        background: var(--primarySoft);
        color: var(--primaryDeep);
      }
      .vD-group-head .noise.teal {
        color: var(--primary);
      }
      .vD-group-head .noise.fg {
        color: var(--fgSoft);
      }
      .vD-group-head .noise.emerald {
        color: var(--emerald);
      }

      .vD-row {
        display: grid;
        grid-template-columns: 22px 44px minmax(0, 1fr) auto 32px 22px;
        align-items: center;
        gap: 16px;
        padding: 14px 24px;
        border-top: 1px solid var(--lineSoft);
        cursor: pointer;
        transition: background 120ms;
      }
      .vD-row:first-of-type {
        border-top: none;
      }
      .vD-row:hover {
        background: var(--paper);
      }
      .vD-row input[type='checkbox'] {
        accent-color: var(--primary);
      }
      .vD-row .av-wrap {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        position: relative;
      }
      .vD-row .av-wrap .avatar {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        font-size: 16px;
        box-shadow: 0 2px 8px rgba(14, 20, 19, 0.08);
      }
      .vD-row .name-cell {
        min-width: 0;
      }
      .vD-row .name-cell .nm-row {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: 0;
      }
      .vD-row .name-cell .nm {
        font-weight: 600;
        font-size: 14.5px;
        letter-spacing: -0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }
      .vD-row .name-cell .sub {
        margin-top: 4px;
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--fgMuted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .vD-row .name-cell .sub .sep {
        color: var(--line);
        margin: 0 6px;
      }
      .vD-row .name-cell .why {
        margin-top: 6px;
        font-size: 11.5px;
        color: var(--amber);
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .vD-row .name-cell .why .why-label {
        font-weight: 600;
      }
      .vD-row .freq-eyebrow {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 9.5px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: var(--paper);
        color: var(--fgSoft);
        border: 1px solid var(--lineSoft);
        flex-shrink: 0;
      }
      .vD-row .freq-eyebrow.daily {
        background: rgba(180, 83, 9, 0.08);
        color: var(--amber);
        border-color: rgba(180, 83, 9, 0.18);
      }
      .vD-row .freq-eyebrow.weekly {
        background: var(--paper);
        color: var(--fgSoft);
      }
      .vD-row .freq-eyebrow.vip {
        background: var(--primarySoft);
        color: var(--primaryDeep);
        border-color: rgba(0, 107, 95, 0.18);
      }
      .vD-row .freq-eyebrow.protected {
        background: var(--emeraldWash);
        color: var(--emerald);
        border-color: rgba(4, 120, 87, 0.18);
      }

      /* Action: single primary + overflow */
      .vD-row .rec-action {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .vD-row .rec-btn {
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--fgSoft);
        transition: all 120ms;
        white-space: nowrap;
      }
      .vD-row .rec-btn.unsub {
        background: var(--amber);
        color: white;
        border-color: var(--amber);
      }
      .vD-row .rec-btn.keep {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      .vD-row .rec-btn.archive {
        background: var(--fg);
        color: white;
        border-color: var(--fg);
      }
      .vD-row .rec-btn:hover:not(.unsub):not(.keep):not(.archive) {
        background: var(--paper);
      }
      .vD-row .rec-btn:hover.unsub,
      .vD-row .rec-btn:hover.keep,
      .vD-row .rec-btn:hover.archive {
        filter: brightness(0.95);
      }

      .vD-row .more-btn {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        color: var(--fgMuted);
        background: transparent;
        border: 1px solid transparent;
        font-size: 16px;
        font-weight: 600;
        transition: all 120ms;
      }
      .vD-row:hover .more-btn {
        color: var(--fgSoft);
        border-color: var(--line);
        background: var(--card);
      }
      .vD-row .more-btn:hover {
        background: var(--paper);
      }
      .vD-row .chev {
        color: var(--fgMuted);
        font-size: 13px;
      }
      .vD-row .collapsed-msg {
        padding: 14px 24px;
        font-size: 12px;
        color: var(--fgMuted);
      }

      /* ────────── VARIANT D — DETAIL ────────── */
      .vD-detail .back-link {
        color: var(--fgMuted);
        font-size: 12.5px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 20px;
      }
      .vD-detail-hero {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 32px 36px;
        margin-bottom: 16px;
        box-shadow: var(--shadow-pop);
        position: relative;
        overflow: hidden;
      }
      .vD-detail-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 95% -10%, var(--amberWash) 0%, transparent 50%);
        pointer-events: none;
      }
      .vD-detail-hero .head {
        display: flex;
        gap: 24px;
        align-items: center;
        margin-bottom: 24px;
        position: relative;
      }
      .vD-detail-hero .head .name {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.025em;
        line-height: 1;
      }
      .vD-detail-hero .head .meta {
        font-family: var(--font-mono);
        font-size: 12.5px;
        color: var(--fgMuted);
        margin-top: 6px;
      }
      .vD-detail-hero .head .freq-eyebrow {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(180, 83, 9, 0.08);
        color: var(--amber);
        border: 1px solid rgba(180, 83, 9, 0.18);
        margin-bottom: 8px;
      }
      .vD-detail-hero .narrative {
        font-family: var(--font-display);
        font-size: 24px;
        line-height: 1.32;
        font-weight: 500;
        color: var(--fgSoft);
        margin-bottom: 16px;
        max-width: 720px;
        position: relative;
      }
      .vD-detail-hero .narrative .em {
        color: var(--fg);
        font-weight: 600;
      }
      .vD-detail-hero .roi {
        font-size: 14px;
        color: var(--amber);
        font-weight: 500;
        margin-bottom: 22px;
        position: relative;
      }
      .vD-detail-hero .rec-box {
        background: var(--amberWash);
        border: 1px solid rgba(180, 83, 9, 0.2);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 22px;
        position: relative;
        display: flex;
        gap: 14px;
        align-items: flex-start;
      }
      .vD-detail-hero .rec-box .icon {
        font-size: 18px;
        color: var(--amber);
        line-height: 1.2;
      }
      .vD-detail-hero .rec-box .body {
        flex: 1;
        font-size: 13.5px;
        color: var(--amber);
        line-height: 1.5;
      }
      .vD-detail-hero .rec-box .body strong {
        font-weight: 600;
      }
      .vD-detail-hero .rec-box .body .why {
        display: block;
        color: rgba(180, 83, 9, 0.85);
        margin-top: 6px;
        font-size: 12.5px;
      }
      .vD-detail-hero .actions {
        display: grid;
        grid-template-columns: 2.2fr 1fr 1fr 1fr;
        gap: 10px;
        position: relative;
      }
      .vD-detail-hero .actions .verb {
        padding: 11px 16px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--card);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 3px;
        text-align: left;
        transition: all 120ms;
      }
      .vD-detail-hero .actions .verb.rec {
        background: var(--amber);
        color: white;
        border-color: var(--amber);
      }
      .vD-detail-hero .actions .verb.rec:hover {
        filter: brightness(0.95);
      }
      .vD-detail-hero .actions .verb:hover:not(.rec) {
        background: var(--paper);
        border-color: var(--border);
      }
      .vD-detail-hero .actions .verb .verb-line {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13.5px;
        font-weight: 600;
      }
      .vD-detail-hero .actions .verb .roi {
        font-size: 11px;
        opacity: 0.82;
        font-weight: 500;
        color: var(--fgMuted);
      }
      .vD-detail-hero .actions .verb.rec .roi {
        color: white;
        opacity: 0.9;
      }
      .vD-detail-hero .reasoning-disclose {
        margin-top: 12px;
        position: relative;
        font-size: 12px;
        color: var(--fgMuted);
      }
      .vD-detail-hero .reasoning-disclose a {
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .vD-detail-hero .reasoning-disclose a:hover {
        color: var(--fgSoft);
      }

      .vD-kpi4 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 16px;
        box-shadow: var(--shadow-card);
      }
      .vD-kpi4 .cell {
        padding: 18px 22px;
        border-right: 1px solid var(--lineSoft);
      }
      .vD-kpi4 .cell:last-child {
        border-right: none;
      }
      .vD-kpi4 .cell .label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--fgMuted);
        font-weight: 500;
      }
      .vD-kpi4 .cell .v {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.025em;
        margin-top: 8px;
        font-variant-numeric: tabular-nums;
      }
      .vD-kpi4 .cell .v .unit {
        font-size: 12px;
        color: var(--fgMuted);
        font-weight: 500;
        margin-left: 3px;
        letter-spacing: 0;
      }
      .vD-kpi4 .cell .delta {
        font-size: 11px;
        color: var(--fgMuted);
        margin-top: 4px;
        font-family: var(--font-mono);
      }
      .vD-kpi4 .cell .delta.up {
        color: var(--amber);
      }
      .vD-kpi4 .cell .delta.down {
        color: var(--emerald);
      }

      .vD-timeline {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 22px 26px;
        box-shadow: var(--shadow-card);
        margin-bottom: 14px;
      }
      .vD-timeline h3 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--fgMuted);
        font-weight: 500;
        margin-bottom: 16px;
      }
      .vD-tl-item {
        display: grid;
        grid-template-columns: 84px 18px 1fr;
        gap: 14px;
        padding: 10px 0;
        position: relative;
        align-items: center;
      }
      .vD-tl-item .when {
        font-size: 12px;
        color: var(--fgMuted);
        font-variant-numeric: tabular-nums;
      }
      .vD-tl-item .node {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--card);
        border: 2px solid var(--primary);
        z-index: 1;
        margin-left: 3px;
      }
      .vD-tl-item .node.recent {
        background: var(--primary);
        box-shadow: 0 0 0 4px var(--primarySoft);
      }
      .vD-tl-item:not(:last-child)::after {
        content: '';
        position: absolute;
        left: 92px;

      function spark(values, opts) {
        opts = opts || {};

          h = opts.h || 18,
          color = opts.color || 'var(--primary)';
        const min = Math.min.apply(null, values),
          max = Math.max.apply(null, values);
        const range = max - min || 1;
        const stepX = w / (values.length - 1);
        const pts = values.map((v, i) => [i * stepX, h - ((v - min) / range) * (h - 2) - 1]);
        const d = pts
          .map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1))
          .join(' ');
        return (
          '<svg viewBox="0 0 ' +
          w +
          ' ' +
          h +
          '" width="' +
          w +
          '" height="' +
          h +
          '" preserveAspectRatio="none"><path d="' +
          d +
          '" fill="none" stroke="' +
          color +
          '" stroke-width="' +
          (opts.sw || 1.5) +
          '" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        );

      function barChart(values, opts) {
        opts = opts || {};

          h = opts.h || 180,
          color = opts.color || 'var(--primary)';
        const max = Math.max.apply(null, values);
        const n = values.length;
        const gap = 6;
        const bw = (w - gap * (n - 1)) / n;
        const labels = ['J', 'F', 'M', 'A', 'M', 'J', 'J', 'A', 'S', 'O', 'N', 'D'];
        let rects = '';
        let lbls = '';
        for (let i = 0; i < n; i++) {
          const x = i * (bw + gap);
          const bh = (values[i] / max) * (h - 26);
          const y = h - 26 - bh;
          const isPeak = values[i] === max;
          rects +=
            '<rect x="' +
            x +
            '" y="' +
            y +
            '" width="' +
            bw +
            '" height="' +
            bh +
            '" fill="' +
            color +
            '" fill-opacity="' +
            (isPeak ? 1 : 0.35) +
            '" rx="2"/>';

            rects +=
              '<text x="' +
              (x + bw / 2) +
              '" y="' +
              (y - 4) +
              '" text-anchor="middle" font-size="10" font-family="var(--font-mono)" fill="var(--fgMuted)">' +

          lbls +=

            '" text-anchor="middle" font-size="9" font-family="var(--font-mono)" fill="var(--fgMuted)">' +

          w +
          ' ' +
          h +
          '" width="100%" height="' +
          h +
          '" preserveAspectRatio="none">' +
          rects +
          lbls +

        const w = 60,

        const colors = ['var(--emerald)', 'var(--fg)', 'var(--amber)'];
        const max = Math.max.apply(null, values.concat([1]));

        values.forEach((v, i) => {

            const dayPattern =

                  : 0.1
                : sender.id === '4'
                  ? d < 5
                    ? 0.6

                  : 0.3;
            const intensity = Math.max(0, Math.min(1, dayPattern + (seed / 100 - 0.5) * 0.6));
            cells.push(intensity);

      function quadrantSvg(senders) {
        const W = 760,
          H = 380;
        const pad = { l: 60, r: 30, t: 24, b: 50 };
        const innerW = W - pad.l - pad.r;
        const innerH = H - pad.t - pad.b;
        const maxVol =
          Math.max.apply(
            null,
            senders.map((s) => s.monthly),
          ) * 1.1;
        const bubbles = senders.map((s) => {
          const x = pad.l + s.read * innerW;
          const y = pad.t + (1 - s.monthly / maxVol) * innerH;
          const r = 6 + Math.sqrt(s.monthly) * 2.5;
          let fill = 'rgba(100,109,105,0.55)';
          let stroke = 'rgba(100,109,105,0.9)';
          if (s.rec === 'unsubscribe') {
            fill = 'rgba(180,83,9,0.55)';
            stroke = '#B45309';
          }
          if (s.vip) {
            fill = 'rgba(0,107,95,0.55)';
            stroke = '#006B5F';
          }
          if (s.protected) {
            fill = 'rgba(4,120,87,0.55)';
            stroke = '#047857';
          }
          return { x: x, y: y, r: r, s: s, fill: fill, stroke: stroke };
        });
        const midX = pad.l + 0.5 * innerW;
        const midY = pad.t + 0.5 * innerH;
        let svg =
          '<svg viewBox="0 0 ' +
          W +
          ' ' +
          H +
          '" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">';
        svg +=
          '<rect x="' +
          pad.l +
          '" y="' +
          pad.t +
          '" width="' +
          0.5 * innerW +
          '" height="' +
          0.5 * innerH +
          '" fill="hsl(31 70% 95%)" fill-opacity="0.5"/>';
        svg +=
          '<rect x="' +
          midX +
          '" y="' +
          midY +
          '" width="' +
          0.5 * innerW +
          '" height="' +
          0.5 * innerH +
          '" fill="hsl(160 60% 95%)" fill-opacity="0.5"/>';
        svg +=
          '<line x1="' +
          midX +
          '" y1="' +
          pad.t +
          '" x2="' +
          midX +
          '" y2="' +
          (pad.t + innerH) +
          '" stroke="rgba(14,20,19,0.06)" stroke-dasharray="2 4"/>';
        svg +=
          '<line x1="' +
          pad.l +
          '" y1="' +
          midY +
          '" x2="' +
          (pad.l + innerW) +
          '" y2="' +
          midY +
          '" stroke="rgba(14,20,19,0.06)" stroke-dasharray="2 4"/>';
        svg +=
          '<text x="' +
          (pad.l + 12) +
          '" y="' +
          (pad.t + 20) +
          '" font-family="monospace" font-size="10" fill="#B45309" font-weight="600">UNSUB CANDIDATES</text>';
        svg +=
          '<text x="' +
          (pad.l + innerW - 12) +
          '" y="' +
          (pad.t + innerH - 8) +
          '" text-anchor="end" font-family="monospace" font-size="10" fill="#047857" font-weight="600">VIPs &amp; KEEPERS</text>';
        svg +=
          '<text x="' +
          (pad.l + innerW / 2) +
          '" y="' +
          (pad.t + innerH + 30) +
          '" text-anchor="middle" font-family="monospace" font-size="10" fill="#646D69">ENGAGEMENT  (read rate) →</text>';
        svg +=
          '<text x="20" y="' +
          (pad.t + innerH / 2) +
          '" transform="rotate(-90 20 ' +
          (pad.t + innerH / 2) +
          ')" text-anchor="middle" font-family="monospace" font-size="10" fill="#646D69">VOLUME →</text>';
        bubbles.forEach((b) => {
          svg += '<g>';
          svg +=
            '<circle cx="' +
            b.x +
            '" cy="' +
            b.y +
            '" r="' +
            b.r +
            '" fill="' +
            b.fill +
            '" stroke="' +
            b.stroke +
            '" stroke-width="1.5"/>';
          svg +=
            '<text x="' +
            b.x +
            '" y="' +
            (b.y + b.r + 12) +
            '" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5552" font-weight="500">' +
            b.s.name +
            '</text>';
          svg += '</g>';
        });
        svg += '</svg>';
        return svg;
      }

          spark([22, 28, 30, 35, 32, 38, noiseReductionPct], {
            w: 80,
            h: 14,
            color: 'var(--amber)',
          }) +
          '</div></div>';
        html +=
          '<div class="vD-kpi-cell"><div class="label">Time cost</div><div class="num">' +
          readingHrs +
          '<span class="unit">h/mo</span></div><div class="micro">' +
          spark([5.0, 4.8, 4.6, 4.5, 4.4, 4.3, readingHrs], {
            w: 80,
            h: 14,
            color: 'var(--emerald)',
          }) +
          '</div></div>';
        html +=
          '<div class="vD-kpi-cell"><div class="label">Protected</div><div class="num">' +
          protectedCount +
          '</div><div class="micro" style="font-size:10px;color:var(--fgMuted);font-family:var(--font-mono);">VIPs · receipts</div></div>';
        html +=
          '<div class="vD-kpi-cell"><div class="label">Needs review</div><div class="num">' +
          needsReview +
          '</div><div class="micro">' +
          spark([3, 5, 6, 7, 8, 8, needsReview], { w: 80, h: 14, color: 'var(--primary)' }) +
          '</div></div>';
        html += '</div>';

        // Filter chips — intent groups (user outcomes, not Gmail categories)
        html += '<div class="vD-filters">';
        html += '<button class="chip active">All</button>';
        groups.forEach((g) => {
          html +=
            '<button class="chip">' +
            g.label +
            '<span style="color:var(--fgMuted);font-weight:500;margin-left:4px;">' +
            g.items.length +
            '</span></button>';
        });
        html += '</div>';

        // Intent-grouped tables
        groups.forEach((g, gi) => {
          if (g.items.length === 0) return;
          const totalIntentNoise = g.items.reduce((a, s) => a + noisePerSender(s), 0);
          const sharePct = Math.round((totalIntentNoise / totalNoise) * 100);
          const isExpanded = g.key === 'cleanup'; // only top-priority group auto-expands
          html += '<div class="vD-group"><div class="vD-group-head">';
          html += '<div class="vD-group-head-row">';
          html +=
            '<div style="display:flex;align-items:flex-start;gap:4px;"><span class="vD-group-toggle' +
            (isExpanded ? '' : ' collapsed') +
            '">▾</span><div><div style="display:flex;align-items:center;gap:8px;"><span class="group-icon ' +
            g.key +
            '">' +
            g.icon +
            '</span><span class="label">' +
            g.label +
            '</span><span class="count">' +
            g.items.length +
            ' senders</span></div><div class="desc" style="margin-top:6px;margin-left:38px;">' +
            g.desc +
            '</div></div></div>';
          if (g.key === 'cleanup' || g.key === 'later') {
            html +=
              '<div class="noise ' +
              g.accent +
              '">' +
              sharePct +
              '%<span class="l">of noise</span></div>';
          } else {
            html +=
              '<div class="noise ' +
              g.accent +
              '" style="font-weight:500;font-size:12px;">' +
              g.items.length +
              ' kept</div>';
          }
          html += '</div>';
          html +=
            '<div class="noise-stripe ' +
            g.accent +
            '" style="width:' +
            Math.max(sharePct, 15) +
            '%;"></div>';
          html += '</div>';

          if (isExpanded) {
            g.items.forEach((s) => {
              // Recommended verb logic
              let recBtnText = 'Keep',
                recBtnCls = '';
              if (s.rec === 'unsubscribe') {
                recBtnText = 'Unsubscribe';
                recBtnCls = 'unsub';
              } else if (s.rec === 'archive') {
                recBtnText = 'Archive';
                recBtnCls = 'archive';
              }
              const eyebrow = statusEyebrow(s);
              const why = engineWhy(s);
              const readBit = s.read < 0.1 ? 'rarely read' : Math.round(s.read * 100) + '% read';

              html += '<div class="vD-row"><input type="checkbox" />';
              html +=
                '<div class="av-wrap av-tint-' + s.avIdx + '">' + avatarHtml(s, 'sm') + '</div>';
              html += '<div class="name-cell">';
              html += '<div class="nm-row"><span class="nm">' + s.name + '</span>';
              if (eyebrow)
                html += '<span class="freq-eyebrow ' + eyebrow.cls + '">' + eyebrow.txt + '</span>';
              html += '</div>';
              html +=
                '<div class="sub">' +
                s.domain +
                '<span class="sep">·</span>' +
                s.monthly +
                '/mo<span class="sep">·</span>' +
                readBit +
                '</div>';
              if (why)
                html += '<div class="why"><span class="why-label">Why:</span>' + why + '</div>';
              html += '</div>';
              html +=
                '<div class="rec-action"><button class="rec-btn ' +
                recBtnCls +
                '">' +
                recBtnText +
                '</button></div>';
              html += '<button class="more-btn" title="More actions (K/A/U/L)">···</button>';
              html += '<div class="chev">›</div>';
              html += '</div>';
            });
          } else {
            html +=
              '<div class="collapsed-msg">Collapsed — ' +
              g.items.length +
              ' senders · click to expand</div>';
          }
          html += '</div>';
        });

        html +=
          '<div class="demo-note"><strong>Variant D — Codex-tightened.</strong> Hero: 2-line story + trust line ("Metadata only · No message bodies · Reversible for 7 days"). Weekly progress loop ("2 of 5 cleanup decisions done · 3.1h/year saved"). KPI labels reframed (Senders / Noise reducible / Time cost / Protected / Needs review). Filters + groups are user-intent (Clean up / Move later / Protect / People), not Gmail categories. Rows: one primary action (subtler — no glow shadow), K/A/U/L hidden behind "···" hover-revealed overflow. Inline "Why:" line shows engine reason. Status eyebrow only for VIP/Protected — Daily/Weekly chips dropped to avoid duplicating sub line.</div></div>';
        return html;
      }

      function renderD_Detail() {
        const s = SENDERS[0];
        const readingMins = Math.round(s.monthly * 1.6);
        const yearlySavedHrs = ((s.monthly * 12 * 1.6) / 60).toFixed(1);

        let html = '<div class="vD-detail app-shell">';
        // Trust badge renamed per Codex
        html += brandHeader(
          '<span class="vC-trust-badge"><span class="dot"></span>No message bodies</span>',
        );
        html += '<a class="back-link" href="?variant=D&view=list">‹ Back to your inbox story</a>';

        // Hero card — editorial narrative; reasoning is a quiet disclosure (not inline)
        html += '<div class="vD-detail-hero"><div class="head">';
        html +=
          '<div class="av-tint-' +
          s.avIdx +
          '" style="padding:4px;border-radius:18px;">' +
          avatarHtml(s, 'xl') +
          '</div>';
        html += '<div>';
        html += '<span class="freq-eyebrow">' + CAT_LABEL[s.cat] + '</span>';
        html += '<div class="name">' + s.name + '</div>';
        html += '<div class="meta">' + s.domain + ' · since Mar 2024</div>';
        html += '</div></div>';
        html +=
          '<div class="narrative">Mails you <span class="em">~5×/week</span>. You read <span class="em">' +
          Math.round(s.read * 100) +
          '%</span> of what they send.</div>';
        html +=
          '<div class="roi">↘ Estimated reading cost: ' +
          readingMins +
          ' minutes/month. Unsubscribing saves ~' +
          yearlySavedHrs +
          ' hours/year.</div>';
        // Rec box — tighter, no inline "See reasoning" link
        html +=
          '<div class="rec-box"><span class="icon">▸</span><div class="body"><strong>We recommend Unsubscribe.</strong> Confidence: 89%. <span class="why">Volume up 40% this quarter, read rate below 15% all year.</span></div></div>';
        html += '<div class="actions">';
        html +=
          '<button class="verb rec"><span class="verb-line">Unsubscribe <span class="kbd" style="background:rgba(255,255,255,0.2);color:white;border-color:rgba(255,255,255,0.3);">U</span></span><span class="roi">Saves ~' +
          yearlySavedHrs +
          'h/year</span></button>';
        html +=
          '<button class="verb"><span class="verb-line">Keep <span class="kbd">K</span></span><span class="roi" style="color:var(--fgMuted);">Stay in inbox</span></button>';
        html +=
          '<button class="verb"><span class="verb-line">Archive <span class="kbd">A</span></span><span class="roi" style="color:var(--fgMuted);">Out of inbox</span></button>';
        html +=
          '<button class="verb"><span class="verb-line">Later <span class="kbd">L</span></span><span class="roi" style="color:var(--fgMuted);">Decide tomorrow</span></button>';
        html += '</div>';
        // Quieter reasoning disclosure (moved out of rec-box per Codex)
        html +=
          '<div class="reasoning-disclose"><a href="#">See full reasoning ›</a> · how the engine decided</div>';
        html += '</div>';

        // KPI strip — 4 cells, clean (no spark, no heatmap)
        html += '<div class="vD-kpi4">';
        html +=
          '<div class="cell"><div class="label">Volume</div><div class="v">' +
          s.monthly +
          '<span class="unit"> /mo</span></div><div class="delta up">↑ 40% vs prior 3mo</div></div>';
        html +=
          '<div class="cell"><div class="label">Read rate</div><div class="v">' +
          Math.round(s.read * 100) +
          '<span class="unit">%</span></div><div class="delta">below 20% all year</div></div>';
        html +=
          '<div class="cell"><div class="label">Relationship</div><div class="v">2<span class="unit"> yr</span></div><div class="delta">Since Mar 2024</div></div>';
        html +=
          '<div class="cell"><div class="label">Reading cost</div><div class="v">' +
          readingMins +
          '<span class="unit"> min/mo</span></div><div class="delta up">~' +
          yearlySavedHrs +
          'h/year</div></div>';
        html += '</div>';

        // Recent messages
        html += '<div class="section"><h3>Recent messages</h3>';
        html +=
          '<div class="msg-row"><span class="unread-dot"></span><div><span class="subj">You have 7 new connections</span><span class="snippet">Stay in touch with the people in your network…</span></div><span class="when">2d ago</span><span style="color:var(--fgMuted);font-size:11px;">12KB</span></div>';
        html +=
          '<div class="msg-row"><span class="unread-dot read"></span><div><span class="subj">Your weekly job alert</span><span class="snippet">5 new jobs match your search…</span></div><span class="when">4d ago</span><span style="color:var(--fgMuted);font-size:11px;">8KB</span></div>';
        html +=
          '<div class="msg-row"><span class="unread-dot"></span><div><span class="subj">5 jobs match your search</span><span class="snippet">Software Engineer at Vercel, Senior PM at Linear…</span></div><span class="when">6d ago</span><span style="color:var(--fgMuted);font-size:11px;">9KB</span></div>';
        html += '</div>';

        // Decision timeline (from C, polished)
        html += '<div class="vD-timeline"><h3>Decision timeline</h3>';
        html +=
          '<div class="vD-tl-item"><div class="when">today</div><div class="node recent"></div><div class="what">Engine recommends <strong style="color:var(--amber);">Unsubscribe</strong> <span class="src">· 89% confidence</span></div></div>';
        html +=
          '<div class="vD-tl-item"><div class="when">3w ago</div><div class="node"></div><div class="what">You chose to <strong>Keep</strong> <span class="src">· manual</span></div></div>';
        html +=
          '<div class="vD-tl-item"><div class="when">2mo ago</div><div class="node"></div><div class="what">Engine recommended <strong>Archive</strong> — you accepted <span class="src">· 7 messages affected</span></div></div>';
        html +=
          '<div class="vD-tl-item"><div class="when">2yr ago</div><div class="node"></div><div class="what">First message received <span class="src">· Mar 2024</span></div></div>';
        html += '</div>';

        html +=
          '<div class="demo-note"><strong>Variant D — detail.</strong> Editorial hero w/ Fraunces narrative, explicit time-cost ROI, recommendation w/ "Why?", 4 action buttons w/ per-verb time savings. KPI strip = 4 clean cells, NO sparklines per cell, NO heatmap. Sticky bottom action bar keeps decision reachable while scrolling.</div></div>';

        // Sticky bottom action bar — Codex polish addition
        html += '<div class="vD-sticky-bar">';
        html +=
          '<div class="ctx"><div class="avatar av-' +
          s.avIdx +
          '" style="width:28px;height:28px;border-radius:8px;font-size:11px;">' +
          s.name[0] +
          '</div><div><span class="nm">' +
          s.name +
          '</span> <span class="meta">· ' +
          s.monthly +
          '/mo · ' +
          Math.round(s.read * 100) +
          '% read</span></div></div>';
        html += '<div class="actions">';
        html +=
          '<button class="verb rec">Unsubscribe <span class="kbd" style="background:rgba(255,255,255,0.2);color:white;border-color:rgba(255,255,255,0.3);">U</span></button>';
        html += '<button class="verb">Keep <span class="kbd">K</span></button>';
        html += '<button class="verb">Archive <span class="kbd">A</span></button>';
        html += '<button class="verb">Later <span class="kbd">L</span></button>';
        html += '</div></div>';

        return html;
      }

      /* ─── ROUTER (uses Range API, no innerHTML) ─── */
      const RENDERERS = {
        A: { list: renderA_List, detail: renderA_Detail },
        B: { list: renderB_List, detail: renderB_Detail },
        C: { list: renderC_List, detail: renderC_Detail },
        D: { list: renderD_List, detail: renderD_Detail },
      };

      function render() {
        const fn = RENDERERS[state.variant] && RENDERERS[state.variant][state.view];
        const html = fn ? fn() : '<p style="padding:40px;">Variant not implemented.</p>';
        const app = document.getElementById('app');
        // Use Range.createContextualFragment — safe parse, proper SVG namespace handling.
        // All content above is hardcoded; no user input flows through this fragment.
        const range = document.createRange();
        range.selectNode(app);
        const frag = range.createContextualFragment(html);
        app.replaceChildren(frag);

        document
          .querySelectorAll('[data-v]')
          .forEach((b) => b.classList.toggle('active', b.dataset.v === state.variant));
        document
          .querySelectorAll('[data-w]')
          .forEach((b) => b.classList.toggle('active', b.dataset.w === state.view));
        document.getElementById('desc').textContent = VARIANTS[state.variant];
        const p = new URLSearchParams({ variant: state.variant, view: state.view });
        history.replaceState(null, '', '?' + p.toString());
        window.scrollTo({ top: 0, behavior: 'instant' });
      }

      function setVariant(v) {
        state.variant = v;
        render();
      }
      function setView(w) {
        state.view = w;
        render();
      }

      document
        .querySelectorAll('[data-v]')
        .forEach((btn) => btn.addEventListener('click', () => setVariant(btn.dataset.v)));
      document
        .querySelectorAll('[data-w]')
        .forEach((btn) => btn.addEventListener('click', () => setView(btn.dataset.w)));

      document.getElementById('arrLeft').addEventListener('click', () => {
        const keys = Object.keys(VARIANTS);
        const i = keys.indexOf(state.variant);
        setVariant(keys[(i - 1 + keys.length) % keys.length]);
      });
      document.getElementById('arrRight').addEventListener('click', () => {
        const keys = Object.keys(VARIANTS);
        const i = keys.indexOf(state.variant);
        setVariant(keys[(i + 1) % keys.length]);
      });

      document.addEventListener('keydown', (e) => {
        const t = e.target;
        if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
        if (e.key === 'ArrowLeft') document.getElementById('arrLeft').click();
        if (e.key === 'ArrowRight') document.getElementById('arrRight').click();
      });

      render();
    </script>
  </body>
</html>
